<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS-Alarme</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff3d00">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <style>
        :root {
            --primary: #4a90e2;
            --success: #00ff40; 
            --danger: #e74c3c;
            --bg-sky: #b3e5fc;  
            --header-yellow: #fff9c4; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-sky); min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }

        .top-bar { background-color: var(--header-yellow); padding: 10px 15px; display: flex; flex-direction: column; align-items: center; }
        .header-main { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .app-logo { width: 45px; height: 45px; object-fit: contain; }
        .app-title-box { background: white; border: 1px solid #333; border-radius: 8px; padding: 2px 15px; }
        .app-title-box h1 { color: #ff3d00; font-size: 1.4em; font-weight: 900; text-transform: uppercase; }

        #installBtn {
            background: #ff3d00; color: white; border: none; padding: 8px 15px; border-radius: 20px;
            font-size: 0.8em; font-weight: bold; margin-top: 10px; cursor: pointer; display: none;
        }

        .map-wrapper { margin: 15px 20px; border-radius: 15px; overflow: hidden; border: 3px solid white; height: 300px; }
        #map { height: 100%; width: 100%; }

        .controls { padding: 20px; display: flex; flex-direction: column; gap: 15px; text-align: center; }
        .btn-alarm { padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; }
        .btn-success { background: #2ecc71; }
        .btn-danger { background: #e74c3c; }
        .hidden { display: none; }
        
        .input-wrapper { padding: 0 20px; position: relative; width: 100%; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 15px; border: none; font-size: 1em; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .suggestions { background: white; position: absolute; width: calc(100% - 40px); z-index: 1000; max-height: 150px; overflow-y: auto; }
        .suggestion-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <header class="top-bar">
            <div class="header-main">
                <img src="icons/icon-192.png" alt="Logo" class="app-logo">
                <div class="app-title-box"><h1>GPS - ALARME</h1></div>
                <div class="gps-status-box">
                    <div id="statusIndicator" style="width:20px; height:20px; border-radius:50%; background:#333;"></div>
                </div>
            </div>
            <button id="installBtn">📲 INSTALAR APLICATIVO</button>
        </header>

        <div class="input-wrapper" style="margin-top: 20px;">
            <input type="text" id="destinationInput" placeholder="Digite o destino...">
            <div id="suggestions" class="suggestions" style="display:none;"></div>
        </div>

        <div class="map-wrapper"><div id="map"></div></div>

        <div class="controls">
            <button id="activateAlarm" class="btn-alarm btn-success" disabled>🔔 ATIVAR ALARME</button>
            <button id="stopAlarm" class="btn-alarm btn-danger hidden">🔕 PARAR ALARME</button>
            <div id="alarmStatus">Aguardando GPS...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        let map, userMarker, destination, routingControl, alarmActive = false;
        let userCoords = null;
        let deferredPrompt;
        const alarmAudio = new Audio('audio/alarme.mp3');
        alarmAudio.loop = true;

        // --- FUNÇÃO INSERIDA CONFORME SOLICITADO ---
        function activateGPS() {

    document.getElementById('alarmStatus').textContent = "Buscando sinal...";

    if (!navigator.geolocation) {
        document.getElementById('alarmStatus').textContent = "GPS não suportado.";
        return;
    }

    navigator.geolocation.watchPosition(

        (pos) => {

            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            if (!map) {
                initApp(lat, lng);
            } else {
                updatePos(pos);
            }

        },

        (err) => {

            console.error("Erro GPS:", err);

            let msg = "Erro: ";

            if (err.code == 1) msg += "Permissão negada.";
            else if (err.code == 2) msg += "Sinal indisponível.";
            else if (err.code == 3) msg += "Tempo esgotado.";

            document.getElementById('alarmStatus').innerHTML =
                `<span style="color:red">${msg}</span>`;

        },

        {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 5000
        }

    );

}

        // PWA Install
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });

        document.getElementById('installBtn').onclick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
                deferredPrompt = null;
            }
        };

        function initApp(lat, lng) {
            userCoords = { lat, lng };
            document.getElementById('statusIndicator').style.background = '#00ff40';
            document.getElementById('alarmStatus').textContent = "GPS Ativo";
            map = L.map('map', { zoomControl: false }).setView([lat, lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            userMarker = L.marker([lat, lng]).addTo(map);
            navigator.geolocation.watchPosition(updatePos, null, { enableHighAccuracy: true });
        }

        function updatePos(pos) {
            userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            userMarker.setLatLng([userCoords.lat, userCoords.lng]);
            if(alarmActive) checkDist();
        }

        document.getElementById('destinationInput').oninput = async (e) => {
            if(e.target.value.length < 4) return;
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${e.target.value}&countrycodes=br&limit=5`);
            const data = await res.json();
            const sug = document.getElementById('suggestions');
            sug.innerHTML = data.map(d => `<div class="suggestion-item" onclick="setDest(${d.lat}, ${d.lon}, '${d.display_name}')">${d.display_name}</div>`).join('');
            sug.style.display = 'block';
        };

        window.setDest = (lat, lon, name) => {
            destination = { lat, lng: lon };
            document.getElementById('suggestions').style.display = 'none';
            document.getElementById('activateAlarm').disabled = false;
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [L.latLng(userCoords.lat, userCoords.lng), L.latLng(lat, lon)],
                router: L.Routing.osrmv1({ serviceUrl: `https://router.project-osrm.org/route/v1` }),
                createMarker: () => null,
                lineOptions: { styles: [{ color: '#4a90e2', weight: 6 }] }
            }).addTo(map);
        };

        function checkDist() {
            const d = map.distance([userCoords.lat, userCoords.lng], [destination.lat, destination.lng]);
            if (d <= 500) {
                alarmAudio.play();
                document.getElementById('alarmStatus').innerHTML = "<b style='color:red'>CHEGOU!</b>";
            }
        }

        document.getElementById('activateAlarm').onclick = () => {
            alarmActive = true;
            document.getElementById('activateAlarm').classList.add('hidden');
            document.getElementById('stopAlarm').classList.remove('hidden');
        };

        document.getElementById('stopAlarm').onclick = () => {
            alarmActive = false;
            alarmAudio.pause();
            document.getElementById('activateAlarm').classList.remove('hidden');
            document.getElementById('stopAlarm').classList.add('hidden');
        };

        // INICIALIZAÇÃO
        window.onload = activateGPS;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("SW registrado"))
                .catch(e => console.log("Erro SW:", e));
        }
    </script>
</body>
</html>
